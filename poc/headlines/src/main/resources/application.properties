server.port=${PORT:8080}
logging.level.org.atmosphere=warn

# Launch the default browser when starting the application in development mode
# (off here so the app can be driven by Playwright instead)
vaadin.launch-browser=false

# To improve the performance during development.
# For more information https://vaadin.com/docs/latest/flow/integrations/spring/configuration#special-configuration-parameters
vaadin.allowed-packages=com.vaadin,org.vaadin,com.flowingcode,com.example

# ---------------------------------------------------------------------------
# Multi-user: Keycloak (OIDC) login via Spring Security OAuth2 client.
# The client secret is read from the KEYCLOAK_CLIENT_SECRET env var (never commit it).
# NOTE: with issuer-uri set, Spring fetches Keycloak's discovery doc at startup, so the
# app will only boot once the realm exists and is reachable over http (sslRequired=NONE).
# ---------------------------------------------------------------------------
spring.security.oauth2.client.registration.keycloak.provider=keycloak
spring.security.oauth2.client.registration.keycloak.client-id=rssowl-app
spring.security.oauth2.client.registration.keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:}
spring.security.oauth2.client.registration.keycloak.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.keycloak.scope=openid,profile,email
spring.security.oauth2.client.provider.keycloak.issuer-uri=http://haneman.infraleap.com:8080/realms/rssowl-realm

# ---------------------------------------------------------------------------
# Persistence: H2 file DB so per-user state (subscriptions, read/sticky, order) survives restart.
# ---------------------------------------------------------------------------
spring.datasource.url=jdbc:h2:file:./data/rssowl;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Allow reasonably large OPML uploads (Spring's default cap is 1MB).
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Periodic background feed refresh (RSSOwl-style auto-reload). Default 15 min; first run one interval
# after startup. Set short (e.g. 60000) to demo it.
feeds.refresh-interval-ms=900000
